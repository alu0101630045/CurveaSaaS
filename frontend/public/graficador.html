<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurveaSaaS | Graficador</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body data-requires-auth="true">
    <div class="site-shell">
        <header class="site-header">
            <div>
                <p class="eyebrow">CurveaSaaS</p>
                <h2 class="site-title">Graficador matematico</h2>
            </div>
            <nav class="top-menu" aria-label="Navegacion principal">
                <a class="menu-link" href="/login.html">Inicio de sesion</a>
                <a class="menu-link active" href="/graficador.html">Graficador</a>
                <a class="menu-link" href="/articulos.html">Articulos</a>
            </nav>
            <div class="header-right">
                <span id="currentUser" class="user-label"></span>
                <button id="btnLogout" class="button-ghost" type="button">Cerrar sesion</button>
            </div>
        </header>

        <main class="page-main">
            <section class="panel">
                <h3>Graficador de funciones</h3>
                <p class="subtitle">Escribe una funcion en x y el backend calculara los puntos para dibujar la curva.</p>

                <div class="controls">
                    <label for="funcionInput">f(x)</label>
                    <input type="text" id="funcionInput" placeholder="Ej: sin(x) + 0.3*x^2" value="sin(x)">
                    <button id="btnGraficar" type="button">Graficar</button>
                </div>

                <p id="estado" class="status">Listo para graficar.</p>
            </section>

            <section class="canvas-panel">
                <canvas id="graphCanvas" width="920" height="520"></canvas>
            </section>

            <section class="panel result-panel">
                <h3>Analisis matematico</h3>
                <div class="result-grid">
                    <div>
                        <h4>Serie de Taylor (x0 = 0)</h4>
                        <p id="taylor"></p>
                    </div>
                    <div>
                        <h4>Asintotas</h4>
                        <ul id="asintotas"></ul>
                    </div>
                    <div>
                        <h4>Cortes con ejes</h4>
                        <ul id="cortes"></ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/nav.js"></script>
    <script type="module" src="js/graph.js"></script>
</body>
</html>
