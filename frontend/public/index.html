<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurveaSaaS | Graficador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="panel">
            <h1>Graficador de funciones</h1>
            <p class="subtitle">Escribe una funcion en x y el backend calculara los puntos para dibujar la curva.</p>

            <div class="controls">
                <label for="funcionInput">f(x)</label>
                <input
                    type="text"
                    id="funcionInput"
                    placeholder="Ej: sin(x) + 0.3*x^2"
                    value="sin(x)"
                >
                <button id="btnGraficar">Graficar</button>
            </div>

            <p id="estado" class="status">Listo para graficar.</p>
        </section>

        <section class="canvas-panel">
            <canvas id="graphCanvas" width="920" height="520"></canvas>
        </section>

        <section class="panel result-panel">
            <h2>Analisis matematico</h2>
            <div class="result-grid">
                <div>
                    <h3>Serie de Taylor (x0 = 0)</h3>
                    <p id="taylor"></p>
                </div>
                <div>
                    <h3>Asintotas</h3>
                    <ul id="asintotas"></ul>
                </div>
                <div>
                    <h3>Cortes con ejes</h3>
                    <ul id="cortes"></ul>
                </div>
            </div>
        </section>
    </main>

    <script src="js/index.js" defer></script>
</body>
</html>
